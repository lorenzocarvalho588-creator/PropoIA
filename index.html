<style>
  *{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;box-sizing:border-box}
  body{margin:0;background:#F1F5F9;color:#0F172A}
  i[data-lucide]{width:18px;height:18px;display:inline-block;vertical-align:middle}
  .hov{transition:all .18s ease}.hov:hover{transform:translateY(-2px)}
  .spin{width:32px;height:32px;border:3px solid #DBEAFE;border-top-color:#2563EB;border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fu .35s ease both}
  @keyframes sl{0%{margin-left:-40%}100%{margin-left:110%}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  input,textarea,select{font-family:inherit}
  ::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
  @media print{
    .noprint{display:none!important}
    body{background:#fff;margin:0}
    #wrap{box-shadow:none!important;border-radius:0!important;max-width:100%!important}
  }
</style>

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

/* ─── STYLES ─── */

/* ─── SENHA DE ACESSO ─── */
const SENHA_CORRETA = "propoia2026";

function Login({ onLogin }) {
  const [senha, setSenha] = useState("");
  const [erro, setErro] = useState(false);
  const [loading, setLoading] = useState(false);

  const tentar = () => {
    setLoading(true);
    setTimeout(() => {
      if (senha === SENHA_CORRETA) {
        localStorage.setItem("propoai_auth", "ok");
        onLogin();
      } else {
        setErro(true);
        setLoading(false);
        setTimeout(() => setErro(false), 2500);
      }
    }, 600);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#172554 0%,#1E3A8A 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:"44px 40px",maxWidth:400,width:"100%",boxShadow:"0 30px 80px rgba(0,0,0,.3)",textAlign:"center"}}>
        <div style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#1E3A8A,#3B82F6)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:26}}>✦</div>
        <h1 style={{fontSize:26,fontWeight:800,color:"#0B1220",margin:"0 0 6px",letterSpacing:"-0.5px"}}>Propo<span style={{color:"#2563EB"}}>AI</span></h1>
        <p style={{color:"#64748B",fontSize:14.5,margin:"0 0 28px",lineHeight:1.6}}>Digite a senha de acesso enviada no seu e-mail após a compra.</p>
        <input
          type="password"
          value={senha}
          onChange={e=>setSenha(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&tentar()}
          placeholder="Senha de acesso"
          style={{width:"100%",padding:"13px 16px",border:`2px solid ${erro?"#FCA5A5":"#E2E8F0"}`,borderRadius:12,fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:14,background:erro?"#FFF5F5":"#fff",transition:"all .2s",fontFamily:"inherit"}}
        />
        {erro && <p style={{color:"#DC2626",fontSize:13.5,margin:"-6px 0 12px",fontWeight:600}}>Senha incorreta. Verifique seu e-mail.</p>}
        <button
          onClick={tentar}
          disabled={loading}
          style={{width:"100%",background:"linear-gradient(135deg,#1E3A8A,#2563EB)",color:"#fff",border:"none",padding:"14px",borderRadius:12,fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:loading?.7:1,transition:"all .2s",boxShadow:"0 6px 20px rgba(37,99,235,.35)"}}>
          {loading ? "Verificando..." : "Entrar no PropoAI"}
        </button>
        <p style={{marginTop:20,fontSize:12.5,color:"#94A3B8",lineHeight:1.6}}>
          Não recebeu a senha? Verifique sua caixa de spam<br/>ou entre em contato com o suporte.
        </p>
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const [auth, setAuth] = useState(() => localStorage.getItem("propoai_auth") === "ok");
  const [view,setView] = useState("dashboard");

  if (!auth) return <Login onLogin={() => setAuth(true)} />;
  const [proposals,setProposals] = useState(()=>load("propoai_proposals",[]));
  const [settings,setSettings] = useState(()=>load("propoai_settings",{companyName:"Sua Empresa",logo:"",brandColor:C.primary,email:"",phone:"",whatsapp:""}));
  const [current,setCurrent] = useState(null);
  const [menuOpen,setMenuOpen] = useState(false);
  const isMobile = window.innerWidth < 860;

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  useEffect(()=>{ try{ localStorage.setItem("propoai_proposals",JSON.stringify(proposals)); }catch(e){} },[proposals]);
  useEffect(()=>{ try{ localStorage.setItem("propoai_settings",JSON.stringify(settings)); }catch(e){} },[settings]);

  const saveProposal = (p) => {
    setProposals(prev => prev.some(x=>x.id===p.id) ? prev.map(x=>x.id===p.id?p:x) : [p,...prev]);
    setCurrent(p);
  };
  const delProposal = (id) => setProposals(prev=>prev.filter(x=>x.id!==id));
  const openView = (p,track) => {
    if(track){
      const up={...p,views:(p.views||0)+1,lastViewed:Date.now()};
      setProposals(prev=>prev.map(x=>x.id===p.id?up:x));
      setCurrent(up);
    } else setCurrent(p);
  };

  const nav = [
    {id:"dashboard",label:"Dashboard",icon:"layout-dashboard"},
    {id:"new",label:"Nova Proposta",icon:"plus"},
    {id:"proposals",label:"Minhas Propostas",icon:"folder-open"},
    {id:"templates",label:"Templates",icon:"layout-template"},
    {id:"settings",label:"Configurações",icon:"settings"},
  ];

  if(view==="view" && current)
    return <ViewDoc proposal={current} settings={settings} back={()=>setView("proposals")} publish={saveProposal}/>;

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      {menuOpen && <div className="noprint" onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:40}}/>}

      {/* SIDEBAR */}
      <aside className="noprint" style={{
        width:252,background:C.sidebar,padding:"22px 14px",
        position:isMobile?"fixed":"sticky",top:0,height:"100vh",
        flexShrink:0,display:"flex",flexDirection:"column",zIndex:isMobile?41:1,
        transform:isMobile?(menuOpen?"translateX(0)":"translateX(-110%"):"translateX(0)",
        transition:"transform .25s",
        boxShadow:isMobile&&menuOpen?"0 20px 60px rgba(0,0,0,.5)":"none"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:9,padding:"0 6px",marginBottom:28}}>
          <div style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Icon n="sparkles" c="#93C5FD" s={20}/>
          </div>
          <span style={{fontSize:22,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>Propo<span style={{color:"#60A5FA"}}>AI</span></span>
        </div>

        <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.35)",letterSpacing:".1em",margin:"0 8px 8px"}}>MENU</div>
        <nav style={{display:"flex",flexDirection:"column",gap:4}}>
          {nav.map(it=>{
            const a = view===it.id||(view==="editor"&&it.id==="proposals");
            return <button key={it.id} onClick={()=>{setView(it.id);setMenuOpen(false);}} className="hov"
              style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:11,border:"none",
                cursor:"pointer",background:a?"rgba(255,255,255,.15)":"transparent",
                color:"#fff",fontWeight:a?700:500,fontSize:14.5,textAlign:"left",
                borderLeft:a?`3px solid #60A5FA`:"3px solid transparent"}}>
              <Icon n={it.icon} c={a?"#93C5FD":"rgba(255,255,255,.6)"} s={18}/>{it.label}
            </button>;
          })}
        </nav>

        <div style={{marginTop:"auto"}}>
          <button onClick={()=>{setView("new");setMenuOpen(false);}} className="hov"
            style={{width:"100%",background:"linear-gradient(135deg,#2563EB,#3B82F6)",color:"#fff",border:"none",
              padding:"13px",borderRadius:11,fontSize:15,fontWeight:700,cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",gap:7,
              boxShadow:"0 4px 16px rgba(59,130,246,.4)"}}>
            <Icon n="plus" c="#fff" s={18}/> Nova Proposta
          </button>
        </div>
      </aside>

      {/* MAIN */}
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <header className="noprint" style={{background:"#fff",borderBottom:`1px solid ${C.border}`,
          padding:"14px clamp(16px,4vw,36px)",display:"flex",alignItems:"center",
          justifyContent:"space-between",position:"sticky",top:0,zIndex:30,
          boxShadow:"0 1px 3px rgba(15,23,42,.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {isMobile && <button onClick={()=>setMenuOpen(true)} className="hov"
              style={{display:"inline-flex",alignItems:"center",gap:7,background:C.sidebar,color:"#fff",
                border:"none",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:14}}>
              <Icon n="menu" s={20} c="#fff"/> Menu
            </button>}
            <strong style={{fontSize:19,color:C.text,letterSpacing:"-0.3px"}}>
              {nav.find(n=>n.id===view)?.label || "Editor"}
            </strong>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:13.5,color:C.textSec,fontWeight:600}}>{settings.companyName}</span>
            <div style={{width:36,height:36,borderRadius:"50%",
              background:`linear-gradient(135deg,${C.primary},${C.accent})`,
              display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,overflow:"hidden"}}>
              {settings.logo
                ? <img src={settings.logo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                : (settings.companyName?.[0]||"P")}
            </div>
          </div>
        </header>

        <main style={{flex:1,padding:"26px clamp(16px,4vw,36px)"}}>
          {view==="dashboard" && <Dashboard proposals={proposals} go={setView} open={p=>{setCurrent(p);setView("editor");}}/>}
          {view==="new" && <NewProposal settings={settings} onCreated={p=>{saveProposal(p);setView("editor");}}/>}
          {view==="proposals" && <MyProposals proposals={proposals} edit={p=>{setCurrent(p);setView("editor");}} viewDoc={p=>{openView(p,false);setView("view");}} del={delProposal} go={setView}/>}
          {view==="templates" && <Templates go={setView}/>}
          {view==="settings" && <Settings settings={settings} setSettings={setSettings}/>}
          {view==="editor" && current && <Editor proposal={current} settings={settings} save={saveProposal} viewDoc={p=>{saveProposal(p);setCurrent(p);setView("view");}} back={()=>setView("proposals")}/>}
        </main>
      </div>
    </div>
  );
}

/* ─── DASHBOARD ─── */
function Dashboard({proposals,go,open}){
  const total=proposals.length, viewed=proposals.filter(p=>(p.views||0)>0).length;
  const approved=proposals.filter(p=>p.status==="approved").length;
  const rate=total?Math.round(approved/total*100):0;
  const stats=[
    ["Total de propostas",total,"file-text",C.secondary],
    ["Visualizadas",viewed,"eye","#8B5CF6"],
    ["Aprovadas",approved,"check-circle","#10B981"],
    ["Taxa de aprovação",rate+"%","trending-up",C.success]
  ];
  const recent=[...proposals].sort((a,b)=>b.createdAt-a.createdAt).slice(0,6);
  return <div className="fu" style={{maxWidth:1000}}>
    {total===0 && <div style={{...card,padding:"28px 30px",marginBottom:22,
      background:`linear-gradient(135deg,${C.primary} 0%,#1D4ED8 100%)`,color:"#fff",border:"none",
      boxShadow:"0 8px 30px rgba(30,58,138,.3)"}}>
      <h2 style={{margin:"0 0 8px",fontSize:22,fontWeight:800}}>Bem-vindo ao PropoAI 👋</h2>
      <p style={{margin:0,opacity:.9,fontSize:15,lineHeight:1.65,maxWidth:560}}>
        Transforme informações simples em propostas comerciais profissionais em minutos.
        A IA escreve, você personaliza com sua marca e impressiona seus clientes.
      </p>

/* ─── NEW PROPOSAL ─── */
function NewProposal({settings,onCreated}){
  const [f,setF] = useState({clientName:"",company:"",template:"Marketing Digital",service:"",objective:"",scope:"",deadline:"",value:"",notes:""});
  const [loading,setLoading] = useState(false);
  const [err,setErr] = useState("");
  const set = k => e => setF({...f,[k]:e.target.value});

  const gen = async() => {
    if(!f.service.trim()){ setErr("Informe ao menos o serviço para gerar a proposta."); return; }
    setErr(""); setLoading(true);
    try{
      const res = await fetch("/.netlify/functions/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({...f,companyName:settings.companyName})
      });
      if(!res.ok) throw new Error("status "+res.status);
      const data = await res.json();
      if(!data.content) throw new Error("sem content");
      onCreated({
        id:uid(),...f,
        companyName:settings.companyName,
        createdAt:Date.now(),views:0,status:"draft",
        content:data.content
      });
    }catch(e){
      setLoading(false);
      setErr("Não foi possível gerar agora. Verifique se o app está publicado no Netlify com a chave da API configurada.");
    }
  };

  if(loading) return (
    <div className="fu" style={{textAlign:"center",marginTop:70}}>
      <div className="spin" style={{margin:"0 auto"}}/>
      <h3 style={{marginTop:22,fontSize:20,fontWeight:800}}>Gerando sua proposta com IA…</h3>
      <p style={{color:C.textSec,fontSize:15}}>Estamos redigindo um documento profissional e persuasivo para você.<br/>Leva só alguns segundos.</p>
      <div style={{marginTop:20,height:4,background:C.border,borderRadius:100,overflow:"hidden",maxWidth:260,margin:"20px auto 0"}}>
        <div style={{height:"100%",width:"40%",background:`linear-gradient(90deg,${C.secondary},${C.accent})`,borderRadius:100,animation:"sl 1.5s ease infinite"}}/>
      </div>
    </div>
  );

  return <div className="fu" style={{maxWidth:720}}>
    <h2 style={{margin:"0 0 4px",fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>Crie uma proposta profissional em minutos</h2>
    <p style={{color:C.textSec,marginTop:0,marginBottom:22,fontSize:14.5,lineHeight:1.65}}>
      Preencha as informações do projeto e a IA monta uma apresentação completa.<br/>
      Quanto mais detalhes, mais persuasiva e personalizada fica a proposta.
    </p>
    <div style={{...card,padding:28}}>
      <Field l="Categoria / Template">
        <select value={f.template} onChange={set("template")} style={inp}>
          {TEMPLATES.map(t=><option key={t.id}>{t.id}</option>)}
        </select>
      </Field>
      <div style={rowG}>
        <Field l="Nome do Cliente"><input value={f.clientName} onChange={set("clientName")} style={inp} placeholder="Ex.: João Silva"/></Field>
        <Field l="Empresa"><input value={f.company} onChange={set("company")} style={inp} placeholder="Ex.: Acme Ltda"/></Field>
      </div>
      <Field l="Serviço *"><input value={f.service} onChange={set("service")} style={inp} placeholder="Ex.: Gestão de tráfego pago para e-commerce"/></Field>
      <Field l="Objetivo"><input value={f.objective} onChange={set("objective")} style={inp} placeholder="Ex.: Aumentar vendas online em 40%"/></Field>
      <Field l="Escopo"><textarea value={f.scope} onChange={set("scope")} rows={3} style={{...inp,resize:"vertical"}} placeholder="Descreva o que será entregue..."/></Field>
      <div style={rowG}>
        <Field l="Prazo"><input value={f.deadline} onChange={set("deadline")} style={inp} placeholder="Ex.: 60 dias"/></Field>
        <Field l="Valor do Projeto"><input value={f.value} onChange={set("value")} style={inp} placeholder="Ex.: R$ 5.000/mês"/></Field>
      </div>
      <Field l="Observações para a IA"><textarea value={f.notes} onChange={set("notes")} rows={2} style={{...inp,resize:"vertical"}} placeholder="Informações extras, tom, destaques..."/></Field>
      {err && <div style={{background:"#FEF2F2",color:"#DC2626",padding:"12px 14px",borderRadius:10,fontSize:13.5,marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
        <Icon n="alert-circle" c="#DC2626" s={16}/> {err}
      </div>}
      <button onClick={gen} className="hov" style={{...btnP,width:"100%",padding:"15px",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",gap:9,boxShadow:`0 4px 16px ${C.secondary}40`}}>
        <Icon n="sparkles" c="#fff" s={19}/> Gerar Proposta com IA
      </button>
    </div>
  </div>;
}

function EF({l,v,on}){ return <div style={{marginBottom:12}}><label style={lab}>{l}</label><input value={v||""} onChange={e=>on(e.target.value)} style={inp}/></div>; }
function EA({l,v,on}){ return <div style={{marginBottom:12}}><label style={lab}>{l}</label><textarea value={v||""} onChange={e=>on(e.target.value)} rows={3} style={{...inp,resize:"vertical"}}/></div>; }
function EL({l,items=[],on}){
  const u=(i,v)=>{const a=[...(items||[])];a[i]=v;on(a);};
  return <div style={{marginBottom:12}}>
    <label style={lab}>{l}</label>
    {(items||[]).map((it,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
      <input value={it} onChange={e=>u(i,e.target.value)} style={{...inp,padding:"8px 11px",fontSize:13.5}}/>
      <button onClick={()=>on(items.filter((_,x)=>x!==i))} style={{...btnG,padding:"0 10px",color:"#DC2626",borderColor:"#FECACA"}}>
        <Icon n="x" s={14} c="#DC2626"/>
      </button>
    </div>)}
    <button onClick={()=>on([...(items||[]),""])} style={{background:"none",border:"none",color:C.secondary,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Adicionar</button>
  </div>;
}

/* ─── VIEW DOC ─── */
function ViewDoc({proposal,settings,back,publish}){
  const [share,setShare] = useState(false);
  const [copied,setCopied] = useState(false);

  const link = `${window.location.origin}${window.location.pathname}#proposta-${proposal.id}`;

  const copy = () => {
    navigator.clipboard?.writeText(link).catch(()=>{});
    setCopied(true); setTimeout(()=>setCopied(false),1800);
  };

  // WhatsApp: manda link + nome da proposta
  const sendWhatsApp = () => {
    const title = proposal.content?.coverTitle || proposal.service;
    const client = proposal.clientName ? ` para ${proposal.clientName}` : "";
    const msg = `Olá! Segue a proposta comercial *"${title}"*${client}. Acesse pelo link: ${link}`;
    const phone = settings.whatsapp ? settings.whatsapp.replace(/\D/g,"") : "";
    const url = phone
      ? `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`
      : `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
  };

  const downloadPDF = () => window.print();

  return <div style={{padding:"20px clamp(16px,4vw,36px)"}}>
    <div className="noprint" style={{display:"flex",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <button onClick={back} style={{...btnG,display:"inline-flex",alignItems:"center",gap:6}}>
        <Icon n="chevron-left" s={16}/> Voltar
      </button>
      <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:C.textSec}}>
        <Icon n="eye" s={15}/> {proposal.views||0} visualizações
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button onClick={()=>setShare(true)} className="hov" style={{...btnG,display:"inline-flex",alignItems:"center",gap:6}}>
          <Icon n="share-2" s={16}/> Compartilhar
        </button>
        <button onClick={sendWhatsApp} className="hov" style={{...btnWA,display:"inline-flex",alignItems:"center",gap:7}}>
          <Icon n="send" c="#fff" s={16}/> WhatsApp
        </button>
        <button onClick={downloadPDF} className="hov" style={{...btnP,display:"inline-flex",alignItems:"center",gap:7}}>
          <Icon n="download" c="#fff" s={16}/> Baixar PDF
        </button>
      </div>
    </div>

    <div id="wrap" style={{maxWidth:800,margin:"0 auto",background:"#fff",borderRadius:16,boxShadow:"0 8px 40px rgba(15,23,42,.10)",overflow:"hidden"}}>
      <Doc proposal={proposal} settings={settings}/>
    </div>

    {/* MODAL COMPARTILHAR */}
    {share && <div className="noprint" onClick={()=>setShare(false)}
      style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:"#fff",borderRadius:18,padding:28,maxWidth:460,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <h3 style={{margin:"0 0 6px",fontSize:18,fontWeight:800}}>Compartilhar proposta</h3>
        <p style={{color:C.textSec,fontSize:14,marginTop:0,marginBottom:18}}>Envie diretamente ao seu cliente:</p>

        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input readOnly value={link} style={{...inp,fontSize:12.5}}/>
          <button onClick={copy} className="hov" style={{...btnP,whiteSpace:"nowrap",minWidth:90}}>
            {copied?"✓ Copiado":"Copiar"}
          </button>
        </div>

        <button onClick={sendWhatsApp} className="hov"
          style={{...btnWA,width:"100%",marginBottom:10,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:15,padding:"13px"}}>
          <Icon n="send" c="#fff" s={18}/> Enviar pelo WhatsApp
        </button>

        <button onClick={downloadPDF} className="hov"
          style={{...btnG,width:"100%",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:7}}>
          <Icon n="download" s={16}/> Baixar como PDF
        </button>

        <button onClick={()=>setShare(false)}
          style={{...btnG,width:"100%",marginTop:10,color:C.textSec,border:"none",fontSize:13}}>
          Fechar
        </button>
      </div>
    </div>}
  </div>;
}

/* ─── DOC (proposta renderizada) ─── */
function Doc({proposal,settings,compact}){
  const c = proposal.content||{};
  const brand = settings.brandColor||C.primary;
  const pad = compact?20:52;

  const SecTitle = ({n,children}) => (
    <div style={{display:"flex",alignItems:"center",gap:10,margin:compact?"22px 0 10px":"38px 0 15px"}}>
      <span style={{fontSize:11,fontWeight:800,color:brand,letterSpacing:".05em"}}>{n}</span>
      <h2 style={{fontSize:compact?16:22,fontWeight:800,margin:0}}>{children}</h2>
    </div>
  );

  const Li = ({items,mark}) => (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {(items||[]).map((it,i)=>(
        <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
          {mark
            ? <Icon n="check" c={C.success} s={compact?15:18}/>
            : <span style={{width:6,height:6,borderRadius:"50%",background:brand,marginTop:7,flexShrink:0}}/>}
          <span style={{fontSize:compact?13.5:15,color:"#334155",lineHeight:1.65}}>{it}</span>
        </div>
      ))}
    </div>
  );

  return <div>
    {/* HEADER */}
    <div style={{background:`linear-gradient(135deg,${brand} 0%,#2563EB 100%)`,color:"#fff",padding:`${pad}px ${pad}px ${pad+6}px`}}>
      <div style={{marginBottom:compact?22:44}}>
        {settings.logo
          ? <img src={settings.logo} style={{height:compact?24:32,borderRadius:6,background:"rgba(255,255,255,.95)",padding:3}}/>
          : <strong style={{fontSize:compact?14:17,opacity:.9}}>{settings.companyName}</strong>}
      </div>
      <span style={{display:"inline-block",padding:"4px 12px",background:"rgba(255,255,255,.2)",borderRadius:100,fontSize:compact?11:12.5,fontWeight:600,marginBottom:12}}>
        {proposal.template}
      </span>
      <h1 style={{fontSize:compact?22:38,fontWeight:800,lineHeight:1.1,margin:0,letterSpacing:"-1px"}}>
        {c.coverTitle||proposal.service}
      </h1>
      {c.coverSubtitle && <p style={{fontSize:compact?14:18,opacity:.9,marginTop:10,marginBottom:0}}>{c.coverSubtitle}</p>}
      <div style={{marginTop:compact?20:36,fontSize:compact?12.5:14.5,opacity:.85}}>
        <div><b>Preparado para:</b> {proposal.clientName||"—"}{proposal.company?` · ${proposal.company}`:""}</div>
        <div style={{marginTop:4}}><b>Data:</b> {new Date(proposal.createdAt).toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}</div>
      </div>
    </div>

    {/* BODY */}
    <div style={{padding:`${compact?4:14}px ${pad}px ${pad}px`}}>
      {c.presentation && <>
        <SecTitle n="01">Apresentação</SecTitle>
        {String(c.presentation).split("\n").filter(Boolean).map((x,i)=><p key={i} style={{fontSize:compact?13.5:15,lineHeight:1.75,color:"#334155",margin:"0 0 10px"}}>{x}</p>)}
      </>}

      {c.objectives?.length>0 && <>
        <SecTitle n="02">Objetivos</SecTitle>
        <Li items={c.objectives}/>
      </>}

      {c.scope?.length>0 && <>
        <SecTitle n="03">Escopo do Projeto</SecTitle>
        <Li items={c.scope} mark/>
      </>}

      {c.timeline?.length>0 && <>
        <SecTitle n="04">Cronograma</SecTitle>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {c.timeline.map((t,i)=>(
            <div key={i} style={{display:"flex",gap:14,padding:compact?12:15,background:C.bgSec,borderRadius:11,borderLeft:`3px solid ${brand}`}}>
              <div style={{minWidth:compact?68:92,flexShrink:0}}>
                <div style={{fontWeight:700,fontSize:compact?13:14}}>{t.phase}</div>
                <div style={{fontSize:compact?11:12.5,color:brand,fontWeight:600,marginTop:2}}>{t.duration}</div>
              </div>
              <div style={{fontSize:compact?13:14,color:"#475569",lineHeight:1.6}}>{t.description}</div>
            </div>
          ))}
        </div>
      </>}

      {(c.investmentIntro||c.investmentItems?.length>0||c.investmentTotal) && <>
        <SecTitle n="05">Investimento</SecTitle>
        {c.investmentIntro && <p style={{fontSize:compact?13.5:15,lineHeight:1.7,color:"#334155",marginTop:0}}>{c.investmentIntro}</p>}
        {c.investmentItems?.length>0 && (
          <div style={{border:`1px solid ${C.border}`,borderRadius:11,overflow:"hidden"}}>
            {c.investmentItems.map((it,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",gap:12,padding:compact?"10px 14px":"13px 17px",borderBottom:`1px solid ${C.border}`,fontSize:compact?13:14.5}}>
                <span style={{color:"#334155"}}>{it.item}</span><b>{it.value}</b>
              </div>
            ))}
            {c.investmentTotal && (
              <div style={{display:"flex",justifyContent:"space-between",padding:compact?"12px 14px":"15px 17px",background:`${brand}0e`,fontSize:compact?15:17,fontWeight:800}}>
                <span>Total</span><span style={{color:brand}}>{c.investmentTotal}</span>
              </div>
            )}
          </div>
        )}
      </>}

      {c.benefits?.length>0 && <>
        <SecTitle n="06">Benefícios</SecTitle>
        <div style={{display:"grid",gridTemplateColumns:compact?"1fr":"1fr 1fr",gap:10}}>
          {c.benefits.map((b,i)=>(
            <div key={i} style={{display:"flex",gap:10,padding:compact?11:14,background:C.bgSec,borderRadius:11}}>
              <Icon n="check" c={C.success} s={compact?15:17}/>
              <span style={{fontSize:compact?13:14,color:"#334155"}}>{b}</span>
            </div>
          ))}
        </div>
      </>}

      {c.differentials?.length>0 && <>
        <SecTitle n="07">Diferenciais</SecTitle>
        <Li items={c.differentials}/>
      </>}

      {c.nextSteps?.length>0 && <>
        <SecTitle n="08">Próximos Passos</SecTitle>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {c.nextSteps.map((s,i)=>(
            <div key={i} style={{display:"flex",gap:12,alignItems:"center"}}>
              <div style={{width:compact?26:30,height:compact?26:30,borderRadius:"50%",background:brand,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:compact?12:14,flexShrink:0}}>{i+1}</div>
              <span style={{fontSize:compact?13:14.5,color:"#334155"}}>{s}</span>
            </div>
          ))}
        </div>
      </>}

      {c.closing && (
        <div style={{marginTop:compact?24:42,padding:compact?18:26,background:`${brand}0c`,borderRadius:14,border:`1px solid ${brand}22`}}>
          <p style={{fontSize:compact?13.5:15.5,lineHeight:1.75,color:"#1e293b",margin:0,fontWeight:500}}>{c.closing}</p>
          <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${brand}22`,fontSize:compact?12:13.5,color:C.textSec}}>
            <b style={{color:C.text}}>{settings.companyName}</b>
            {settings.email && <div>{settings.email}</div>}
            {settings.phone && <div>{settings.phone}</div>}
          </div>
        </div>
      )}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
